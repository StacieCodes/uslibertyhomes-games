 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>

<style>
body {
    margin: 0;
    background: #0f0f1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: white;
    font-family: Arial, sans-serif;
}

canvas {
    background: #111;
    border: 2px solid #00ffcc;
    box-shadow: 0 0 20px #00ffcc;
}

button {
    margin-top: 10px;
    padding: 8px 16px;
    background: #00ffcc;
    border: none;
    font-weight: bold;
    cursor: pointer;
}
button:hover { background: #00ccaa; }
</style>
</head>

<body>

<h1>🐍 Snake Game</h1>
<canvas id="game" width="400" height="400"></canvas>
<div>Score: <span id="score">0</span></div>
<button onclick="restart()">Restart</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 20;
const grid = 400;

let snake, direction, food, score, game;
let audioCtx;

// ---------- SOUND ----------
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playSound(freq, duration, type = "square") {
    initAudio();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = type;
    osc.frequency.value = freq;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        audioCtx.currentTime + duration
    );

    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function eatSound() {
    playSound(700, 0.08);
}

function gameOverSound() {
    playSound(300, 0.2);
    setTimeout(() => playSound(200, 0.25), 120);
}

// ---------- GAME ----------
function init() {
    initAudio();
    playSound(500, 0.1); // start sound

    snake = [{ x: 200, y: 200 }];
    direction = "RIGHT";
    score = 0;
    document.getElementById("score").textContent = score;

    spawnFood();

    clearInterval(game);
    game = setInterval(update, 120);
}

function spawnFood() {
    food = {
        x: Math.floor(Math.random() * (grid / box)) * box,
        y: Math.floor(Math.random() * (grid / box)) * box
    };
}

document.addEventListener("keydown", e => {
    if (e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
    if (e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
    if (e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
    if (e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
});

function update() {
    let head = { ...snake[0] };

    if (direction === "UP") head.y -= box;
    if (direction === "DOWN") head.y += box;
    if (direction === "LEFT") head.x -= box;
    if (direction === "RIGHT") head.x += box;

    // wall collision
    if (head.x < 0 || head.y < 0 || head.x >= grid || head.y >= grid) {
        return gameOver();
    }

    // self collision
    for (let part of snake) {
        if (head.x === part.x && head.y === part.y) {
            return gameOver();
        }
    }

    snake.unshift(head);

    // eat food
    if (head.x === food.x && head.y === food.y) {
        score++;
        document.getElementById("score").textContent = score;

        eatSound();
        spawnFood();

        clearInterval(game);
        game = setInterval(update, Math.max(60, 120 - score * 2));
    } else {
        snake.pop();
    }

    draw();
}

function draw() {
    ctx.fillStyle = "#111";
    ctx.fillRect(0, 0, grid, grid);

    // food
    ctx.fillStyle = "red";
    ctx.fillRect(food.x, food.y, box, box);

    // snake
    ctx.fillStyle = "#00ffcc";
    snake.forEach(p => ctx.fillRect(p.x, p.y, box, box));
}

function gameOver() {
    clearInterval(game);
    gameOverSound();
    setTimeout(() => {
        alert("Game Over! Score: " + score);
    }, 200);
}

function restart() {
    init();
}

init();
</script>

</body>
</html>
