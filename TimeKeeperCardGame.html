<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timekeeper TCG</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(#111, #000);
    color: white;
    text-align: center;
}

h1 {
    margin: 10px;
    color: #00ffd5;
}

#game {
    display: flex;
    justify-content: space-around;
    padding: 20px;
}

.player {
    width: 45%;
    border: 2px solid #00ffd5;
    padding: 10px;
    border-radius: 10px;
    background: rgba(0,255,213,0.05);
}

.card {
    background: #111;
    border: 1px solid #444;
    border-radius: 10px;
    padding: 10px;
    margin: 10px;
    box-shadow: 0 0 10px #00ffd5;
}

.art {
    font-size: 40px;
    margin: 10px 0;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #00ffd5;
    font-weight: bold;
}

button:hover {
    background: #00bba3;
}

#log {
    height: 150px;
    overflow-y: auto;
    background: #111;
    margin: 10px;
    padding: 10px;
    border-top: 2px solid #00ffd5;
    text-align: left;
}
</style>
</head>
<body>

<h1>⏳ Timekeeper Trading Card Game</h1>

<div id="game">
    <div class="player" id="p1">
        <h2>Player 1</h2>
        <div id="card1"></div>
        <h3>HP: <span id="hp1">30</span></h3>
        <button onclick="attack(1)">Attack</button>
        <button onclick="drawCard(1)">Draw Card</button>
    </div>

    <div class="player" id="p2">
        <h2>Player 2</h2>
        <div id="card2"></div>
        <h3>HP: <span id="hp2">30</span></h3>
        <button onclick="attack(2)">Attack</button>
        <button onclick="drawCard(2)">Draw Card</button>
    </div>
</div>

<div id="log"></div>

<script>
const rarities = ["Common", "Rare", "Epic", "Legendary"];
const powers = [
    "Time Freeze", "Chrono Shield", "Future Sight",
    "Time Warp", "Paradox Strike", "Rewind Heal"
];
const arts = ["⌛", "⏳", "🕰️", "⚡", "🌌", "🌀", "🔮"];

let player1 = { hp: 30, card: null };
let player2 = { hp: 30, card: null };

function log(msg) {
    document.getElementById("log").innerHTML += msg + "<br>";
    document.getElementById("log").scrollTop = 9999;
}

function randomCard() {
    return {
        name: "Time Card " + Math.floor(Math.random() * 1000),
        attack: Math.floor(Math.random() * 10) + 1,
        defense: Math.floor(Math.random() * 10) + 1,
        rarity: rarities[Math.floor(Math.random() * rarities.length)],
        power: powers[Math.floor(Math.random() * powers.length)],
        art: arts[Math.floor(Math.random() * arts.length)]
    };
}

function render(player) {
    let p = player === 1 ? player1 : player2;
    let el = document.getElementById("card" + player);

    if (!p.card) {
        el.innerHTML = "<p>No card drawn</p>";
        return;
    }

    let c = p.card;

    el.innerHTML = `
        <div class="card">
            <div class="art">${c.art}</div>
            <h3>${c.name}</h3>
            <p><b>ATK:</b> ${c.attack}</p>
            <p><b>DEF:</b> ${c.defense}</p>
            <p><b>Rarity:</b> ${c.rarity}</p>
            <p><b>Power:</b> ${c.power}</p>
        </div>
    `;
}

function drawCard(player) {
    let p = player === 1 ? player1 : player2;
    p.card = randomCard();
    render(player);
    log("Player " + player + " drew a card!");
}

function attack(player) {
    let attacker = player === 1 ? player1 : player2;
    let defender = player === 1 ? player2 : player1;
    let defId = player === 1 ? 2 : 1;

    if (!attacker.card) {
        log("Player " + player + " has no card!");
        return;
    }

    let damage = attacker.card.attack - (defender.card ? defender.card.defense : 0);
    if (damage < 0) damage = 0;

    defender.hp -= damage;
    document.getElementById("hp" + defId).innerText = defender.hp;

    log(`Player ${player} attacks for ${damage} damage!`);

    if (defender.hp <= 0) {
        log("Player " + player + " wins!");
        alert("Game Over! Player " + player + " wins!");
        location.reload();
    }
}

// initial cards
drawCard(1);
drawCard(2);
</script>

</body>
</html>
